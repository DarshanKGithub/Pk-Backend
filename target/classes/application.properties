management.endpoints.web.cors.allowed-methods=GET,OPTIONS
management.endpoints.web.cors.allowed-headers=Authorization,Content-Type

# ─── Step 4: Right-size Hikari connection pool ──────────────────────────────
# Free Postgres tiers cap total connections; 5 max is safe for 0.1 CPU.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=300000

# Disable open-in-view (was causing lazy loads outside transactions)
spring.jpa.open-in-view=false

# Hibernate JDBC batching — reduces DB round-trips on bulk inserts/updates
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Step 1 (verification only): generate_statistics logs query/collection-fetch counts
# so you can confirm the N+1 fixes actually dropped query counts per request.
# Keep OFF by default (adds per-query overhead). Toggle on locally with
# HIBERNATE_STATS=true while load-testing, then turn it back off.
spring.jpa.properties.hibernate.generate_statistics=${HIBERNATE_STATS:false}

# ─── Step 6: Tomcat thread pool + gzip compression ──────────────────────────
# 0.1 CPU can't saturate 200 threads; cap at 50 with a small spare pool.
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=100
server.tomcat.max-connections=200

# Compress JSON responses >= 1 KB — cuts bandwidth and Render egress cost.
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain
server.compression.min-response-size=1024

# ─── Step 7: Boot speed ─────────────────────────────────────────────────────
# Lazy-initialization is intentionally DISABLED: with it on, a misconfigured bean
# fails on first request (opaque 500) instead of at startup. Fail-fast at boot is
# safer on a constrained box where remote 500s are hard to diagnose.
spring.main.lazy-initialization=false
# Skip the startup banner — trivial startup + log saving on a constrained box.
spring.main.banner-mode=off
# Disable JMX; saves memory and startup time (not needed in prod).
spring.jmx.enabled=false

# ─── Cache names (Caffeine spec configured in CacheConfig) ──────────────────
spring.cache.cache-names=products,activeProducts
